<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Hormone Questionnaire Interactive</title>

  <meta name="theme-color" content="#111827" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hormone Form" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Prompt&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />

</head>
<body>
<div class="app-card card text-center">
  <div class="top-actions">
    <button id="installAppBtn" class="btn btn-sm btn-outline-light install-btn" style="display:none;"><i class="bi bi-phone"></i> ติดตั้งแอป</button>
    <div class="btn-group btn-group-sm theme-switcher" role="group" aria-label="Theme mode">
      <button type="button" class="btn btn-outline-light" data-theme-option="light" title="โหมดกลางวัน"><i class="bi bi-sun"></i></button>
      <button type="button" class="btn btn-outline-light" data-theme-option="dark" title="โหมดกลางคืน"><i class="bi bi-moon-stars"></i></button>
      <button type="button" class="btn btn-outline-light" data-theme-option="system" title="ตามระบบ"><i class="bi bi-circle-half"></i></button>
    </div>
    <button id="langToggle" class="btn btn-sm btn-outline-light lang-btn"><i class="bi bi-translate"></i> EN</button>
  </div>
  <h4 class="mb-3" id="formTitle">แบบสอบถาม</h4>
  <h5 class="mb-3" id="formTitle1">ความเปลี่ยนแปลงหลังรับฮอร์โมน</h5>

  <div id="toastContainer" class="toast-container position-fixed app-toast-bottom"></div>
  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>

  <div id="questionContainer" class="mb-2" style="font-weight:500;">
    <div id="introForm">
      <div class="mb-3 text-start">
        <label id="nicknameLabel" for="nickname" class="form-label">ชื่อเล่น</label>
        <input type="text" id="nickname" class="form-control" placeholder="กรอกชื่อเล่น" required>
        <small id="nicknameError" class="validation-message" style="display:none;">กรุณากรอกชื่อเล่น</small>
      </div>
      <div class="mb-3 text-start">
        <label id="emailLabel" for="email" class="form-label">อีเมล</label>
        <input type="email" id="email" class="form-control" placeholder="example@email.com" required>
        <small id="emailError" class="validation-message" style="display:none;">กรุณากรอกอีเมล</small>
      </div>
      <button id="startBtn" class="btn btn-primary mt-2"><i class="bi bi-play-circle"></i> เริ่มทำแบบสอบถาม</button>
    </div>
  </div>
  <button id="nextBtn" class="btn btn-primary" style="display:none;" disabled><i class="bi bi-arrow-right-circle"></i> ถัดไป</button>
  <button id="prevBtn" class="btn btn-secondary mt-2" style="display:none;"><i class="bi bi-arrow-left-circle"></i> ย้อนกลับ</button>
  <div id="result" class="mt-3"></div>
  <footer id="version" class="app-footer mt-3"></footer>

</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/google-sheet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>

</body>
</html>
